name: Figma — Design Diff Check

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  figma-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run figma agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_API_TOKEN: ${{ secrets.FIGMA_API_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        run: |
          claude --print \
            --bare \
            "$(cat agents/figma.md)" \
            "Trigger: schedule — figma-diff-check. Run the full execution workflow defined in this agent spec."
