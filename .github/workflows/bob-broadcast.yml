name: BOB Weekly Broadcast

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  bob-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run BOB weekly broadcast
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          NOTION_BROADCAST_PARENT_ID: ${{ secrets.NOTION_BROADCAST_PARENT_ID || '3347e8aabbb480908aa2dfc2fd478ff9' }}
        run: node scripts/bob-broadcast.js
