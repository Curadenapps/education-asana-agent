name: BOB Weekly Broadcast

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  bob-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run BOB weekly broadcast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_DATABASE_ID: ${{ secrets.NOTION_ROOT_DATABASE_ID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        run: |
          claude --print \
            --bare \
            "$(cat skills/curaden-communications/SKILL.md)" \
            "Trigger: schedule — weekly-broadcast. Run the BOB Weekly Broadcast procedure defined in this skill."
