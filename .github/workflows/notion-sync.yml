name: Notion Sync — Truth Cache

on:
  schedule:
    - cron: "50 * * * *"
  workflow_dispatch:

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run notion-sync agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_DATABASE_ID: ${{ secrets.NOTION_ROOT_DATABASE_ID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          DISABLE_AUTOUPDATER: "1"
        run: |
          claude -p "Run the notion-sync agent: read agents/notion-sync.md and execute its workflow. Trigger: schedule — pre-scan-notion-sync."
