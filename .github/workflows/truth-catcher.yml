name: Truth Catcher — Hourly Scan

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  truth-catcher:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run truth-catcher agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_DATABASE_ID: ${{ secrets.NOTION_ROOT_DATABASE_ID }}
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          DISABLE_AUTOUPDATER: "1"
        run: |
          claude -p "Run the truth-catcher agent: read agents/truth-catcher.md and execute its workflow. Trigger: schedule — hourly-scan. Mode: batch. Limit: 50."
